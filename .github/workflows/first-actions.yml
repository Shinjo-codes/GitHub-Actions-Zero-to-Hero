#This file automates the testing of a Python code every time changes are pushed to this repository

name: My First GitHub Actions

#Trigger Event
on: [push] #A push-based automation that's triggered when code is pushed, or a new commit is made.

#Jobs Section
jobs: #A group of steps that run on a machine, and the name of the job here is 'build'
  build:
    runs-on: ubuntu-latest #Execution environment for this job is on Linux (Ubuntu) hosted by GitHub

#Matrix Build: This code runs the same job two times on v3.8 and v3.9 of Python
    strategy:
      matrix:
        python-version: [3.8, 3.9]

#What actually runs
    steps:
    
    #Step 1
    - uses: actions/checkout@v3 #Pulls the repository code into the runner, else workflow has no access to code
    
    #Step 2
    - name: Set up Python #Installs Python on the runner
      uses: actions/setup-python@v2 #Installs v2 of plugin
      with:
        python-version: ${{ matrix.python-version }} #Dynamically chooses one of the two Python versions

  #Step 3
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip #Shell command to upgrade pip
        pip install pytest #Testing framework

  #Step 4
    - name: Run tests
      run: |
        cd src
        python -m pytest addition.py #Run test using pytest on addition.py
